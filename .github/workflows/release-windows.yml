name: Release Windows

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Verified master tag to package and publish.
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package Windows installer
    runs-on: windows-latest
    env:
      HAS_SIGNING_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install application dependencies
        run: npm.cmd ci
      - name: Validate release metadata
        run: npm.cmd run release:check
      - name: Resolve and verify the release tag
        id: release
        shell: pwsh
        run: |
          $tag = '${{ inputs.tag }}'
          git fetch --tags --force
          $tagCommit = git rev-parse "$tag^{commit}"
          $checkedOutCommit = git rev-parse HEAD
          if ($tagCommit -ne $checkedOutCommit) {
            throw "Tag $tag points to $tagCommit instead of the checked-out commit $checkedOutCommit."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
      - name: Build Windows installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm.cmd run build:app -- --bundles nsis,msi
      - name: Sign Windows installers when a certificate is configured
        if: env.HAS_SIGNING_CERTIFICATE == 'true'
        env:
          CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'computability-signing.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERTIFICATE_PFX_BASE64))
          $password = ConvertTo-SecureString -String $env:CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          $signTool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (!$signTool) { throw 'signtool.exe is not available on the Windows runner.' }
          $files = @(Get-ChildItem 'target/release/bundle/nsis/*.exe', 'target/release/bundle/msi/*.msi' -ErrorAction Stop | ForEach-Object FullName)
          foreach ($file in $files) {
            & $signTool sign /fd SHA256 /sha $certificate.Thumbprint /tr $env:TIMESTAMP_URL /td SHA256 $file
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for $file." }
            & $signTool verify /pa /v $file
            if ($LASTEXITCODE -ne 0) { throw "Signature verification failed for $file." }
          }
      - name: Refresh updater signatures after Authenticode
        if: env.HAS_SIGNING_CERTIFICATE == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          $files = @(Get-ChildItem 'target/release/bundle/nsis/*.exe', 'target/release/bundle/msi/*.msi' -ErrorAction Stop | ForEach-Object FullName)
          foreach ($file in $files) {
            npx.cmd tauri signer sign $file
            if ($LASTEXITCODE -ne 0) { throw "Updater signing failed for $file." }
          }
      - name: Preserve installers in the workflow
        uses: actions/upload-artifact@v4
        with:
          name: Computability-Windows-${{ steps.release.outputs.tag }}
          if-no-files-found: error
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
            target/release/bundle/msi/*.msi
            target/release/bundle/msi/*.sig
      - name: Create signed updater manifest
        env:
          TAG: ${{ steps.release.outputs.tag }}
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $installer = Get-ChildItem 'target/release/bundle/nsis/*.exe' -ErrorAction Stop | Select-Object -First 1
          $signatureFile = Get-ChildItem 'target/release/bundle/nsis/*.sig' -ErrorAction Stop | Select-Object -First 1
          $assetName = [Uri]::EscapeDataString($installer.Name)
          $manifest = [ordered]@{
            version = $version
            notes = "Computability $($env:TAG)"
            pub_date = (Get-Date).ToUniversalTime().ToString('o')
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = (Get-Content $signatureFile.FullName -Raw).Trim()
                url = "https://github.com/Tony0380/Computability/releases/download/$($env:TAG)/$assetName"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 6 | Set-Content -Path latest.json -Encoding utf8
      - name: Publish installers to the version release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem 'target/release/bundle/nsis/*.exe', 'target/release/bundle/nsis/*.sig', 'target/release/bundle/msi/*.msi', 'target/release/bundle/msi/*.sig' -ErrorAction Stop |
            ForEach-Object { $_.FullName }
          )
          $files += (Resolve-Path latest.json).Path
          gh release view $env:TAG 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG $files --clobber
          } else {
            gh release create $env:TAG $files --generate-notes --title "Computability $env:TAG"
          }
