name: Release desktop packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Verified master tag to package and publish.
        required: true
        type: string

permissions:
  contents: write

jobs:
  package-windows:
    name: Package Windows installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install application dependencies
        run: npm.cmd ci
      - name: Validate release metadata
        run: npm.cmd run release:check
      - name: Resolve and verify the release tag
        shell: pwsh
        run: |
          git fetch --tags --force
          $tagCommit = git rev-parse '${{ inputs.tag }}^{commit}'
          $checkedOutCommit = git rev-parse HEAD
          if ($tagCommit -ne $checkedOutCommit) { throw "Tag does not point to the checked-out commit." }
      - name: Build Windows installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm.cmd run build:app -- --bundles nsis,msi
      - name: Collect Windows assets
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force release-assets | Out-Null
          $exe = Get-ChildItem target/release/bundle/nsis/*.exe | Select-Object -First 1
          $msi = Get-ChildItem target/release/bundle/msi/*.msi | Select-Object -First 1
          Copy-Item $exe.FullName "release-assets/Computability_${version}_windows-x86_64-setup.exe"
          Copy-Item "$($exe.FullName).sig" "release-assets/Computability_${version}_windows-x86_64-setup.exe.sig"
          Copy-Item $msi.FullName "release-assets/Computability_${version}_windows-x86_64.msi"
          Copy-Item "$($msi.FullName).sig" "release-assets/Computability_${version}_windows-x86_64.msi.sig"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: Computability-Windows-${{ inputs.tag }}
          if-no-files-found: error
          path: release-assets

  package-linux:
    name: Package Linux AppImage and Debian
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libfuse2 xvfb
      - name: Install application dependencies
        run: npm ci
      - name: Validate release metadata
        run: npm run release:check
      - name: Build Linux packages
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build:app -- --bundles appimage,deb
      - name: Smoke-test the Linux AppImage
        shell: bash
        run: |
          set -euo pipefail
          appimage=$(find target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' | head -n 1)
          test -n "$appimage"

          set +e
          APPIMAGE_EXTRACT_AND_RUN=1 timeout 15s xvfb-run -a "$appimage" >appimage-smoke.log 2>&1
          status=$?
          set -e

          cat appimage-smoke.log
          if [ "$status" -ne 124 ]; then
            echo "AppImage exited during the startup smoke test (status $status)." >&2
            exit 1
          fi
      - name: Collect Linux assets
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          mkdir -p release-assets
          appimage=$(find target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' | head -n 1)
          deb=$(find target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | head -n 1)
          test -n "$appimage"; test -n "$deb"
          cp "$appimage" "release-assets/Computability_${version}_linux-x86_64.AppImage"
          cp "$appimage.sig" "release-assets/Computability_${version}_linux-x86_64.AppImage.sig"
          cp "$deb" "release-assets/Computability_${version}_linux-x86_64.deb"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: Computability-Linux-${{ inputs.tag }}
          if-no-files-found: error
          path: release-assets

  package-macos-x86:
    name: Package macOS Intel DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          targets: x86_64-apple-darwin
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - name: Build macOS Intel package
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build:app -- --target x86_64-apple-darwin --bundles app,dmg
      - name: Collect macOS Intel asset
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          mkdir -p release-assets
          dmg=$(find target -type f -path '*/bundle/dmg/*.dmg' | head -n 1)
          test -n "$dmg"
          archive=$(find target -type f -name '*.app.tar.gz' | head -n 1)
          test -n "$archive"
          cp "$dmg" "release-assets/Computability_${version}_macos-x86_64.dmg"
          cp "$archive" "release-assets/Computability_${version}_macos-x86_64.app.tar.gz"
          cp "$archive.sig" "release-assets/Computability_${version}_macos-x86_64.app.tar.gz.sig"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: Computability-macOS-x86-${{ inputs.tag }}
          if-no-files-found: error
          path: release-assets

  package-macos-arm:
    name: Package macOS Apple Silicon DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          targets: aarch64-apple-darwin
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - name: Build macOS Apple Silicon package
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build:app -- --target aarch64-apple-darwin --bundles app,dmg
      - name: Collect macOS Apple Silicon asset
        shell: bash
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          mkdir -p release-assets
          dmg=$(find target -type f -path '*/bundle/dmg/*.dmg' | head -n 1)
          test -n "$dmg"
          archive=$(find target -type f -name '*.app.tar.gz' | head -n 1)
          test -n "$archive"
          cp "$dmg" "release-assets/Computability_${version}_macos-aarch64.dmg"
          cp "$archive" "release-assets/Computability_${version}_macos-aarch64.app.tar.gz"
          cp "$archive.sig" "release-assets/Computability_${version}_macos-aarch64.app.tar.gz.sig"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: Computability-macOS-arm-${{ inputs.tag }}
          if-no-files-found: error
          path: release-assets

  publish:
    name: Publish multiplatform release
    needs: [package-windows, package-linux, package-macos-x86, package-macos-arm]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          pattern: Computability-*
          path: release-assets
          merge-multiple: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Generate updater manifest and Arch recipe
        env:
          TAG: ${{ inputs.tag }}
        run: |
          version=$(node -p "require('./package.json').version")
          node scripts/create-update-manifest.mjs --assets-dir release-assets --tag "$TAG" --version "$version" --output release-assets/latest.json
          node scripts/create-arch-pkgbuild.mjs --assets-dir release-assets --tag "$TAG" --version "$version" --output release-assets/PKGBUILD
      - name: Publish all desktop packages
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --generate-notes --title "Computability $TAG"
          gh release upload "$TAG" release-assets/* --clobber
