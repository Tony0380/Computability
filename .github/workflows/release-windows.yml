name: Release Windows

on:
  workflow_run:
    workflows: ["Quality"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package Windows installer
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'master' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install application dependencies
        run: npm.cmd ci
      - name: Validate release metadata
        run: npm.cmd run release:check
      - name: Resolve and verify the release tag
        id: release
        if: github.event_name == 'workflow_run'
        shell: pwsh
        run: |
          $version = ([regex]::Match((Get-Content Cargo.toml -Raw), '(?m)^version\s*=\s*"([^"]+)"')).Groups[1].Value
          $tag = "v${version}-master.${{ github.event.workflow_run.run_number }}"
          git fetch --tags --force
          $tagCommit = git rev-parse "$tag^{commit}"
          if ($tagCommit -ne '${{ github.event.workflow_run.head_sha }}') {
            throw "Tag $tag points to $tagCommit instead of the verified commit."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
      - name: Build Windows installers
        run: npm.cmd run build:app -- --bundles nsis,msi
      - name: Preserve installers in the workflow
        uses: actions/upload-artifact@v4
        with:
          name: Computability-Windows-${{ steps.release.outputs.tag || github.sha }}
          if-no-files-found: error
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
      - name: Publish installers to the version release
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem 'target/release/bundle/nsis/*.exe', 'target/release/bundle/msi/*.msi' -ErrorAction Stop |
            ForEach-Object { $_.FullName }
          )
          gh release view $env:TAG 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG $files --clobber
          } else {
            gh release create $env:TAG $files --generate-notes --title "Computability $env:TAG"
          }
