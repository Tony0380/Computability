name: Release Windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install application dependencies
        run: npm.cmd ci
      - name: Validate release metadata
        run: npm.cmd run release:check
      - name: Build Windows installers
        run: npm.cmd run build:app -- --bundles nsis,msi
      - name: Preserve installers in the workflow
        uses: actions/upload-artifact@v4
        with:
          name: Computability-Windows-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
      - name: Publish installers to the version release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem 'src-tauri/target/release/bundle/nsis/*.exe', 'src-tauri/target/release/bundle/msi/*.msi' -ErrorAction Stop |
            ForEach-Object { $_.FullName }
          )
          gh release view $env:TAG 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG $files --clobber
          } else {
            gh release create $env:TAG $files --generate-notes --title "Computability $env:TAG"
          }
