name: Release Windows

on:
  workflow_run:
    workflows: ["Quality"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package Windows installer
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'master' &&
       github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install application dependencies
        run: npm.cmd ci
      - name: Validate release metadata
        run: npm.cmd run release:check
      - name: Resolve and verify the release tag
        id: release
        if: github.event_name == 'workflow_run'
        shell: pwsh
        run: |
          $version = ([regex]::Match((Get-Content Cargo.toml -Raw), '(?m)^version\s*=\s*"([^"]+)"')).Groups[1].Value
          $tag = "v${version}-master.${{ github.event.workflow_run.run_number }}"
          git fetch --tags --force
          $tagCommit = git rev-parse "$tag^{commit}"
          if ($tagCommit -ne '${{ github.event.workflow_run.head_sha }}') {
            throw "Tag $tag points to $tagCommit instead of the verified commit."
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
      - name: Build Windows installers
        run: npm.cmd run build:app -- --bundles nsis,msi
      - name: Sign Windows installers when a certificate is configured
        if: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' }}
        env:
          CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP 'computability-signing.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERTIFICATE_PFX_BASE64))
          $password = ConvertTo-SecureString -String $env:CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          $signTool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe' |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (!$signTool) { throw 'signtool.exe is not available on the Windows runner.' }
          $files = @(Get-ChildItem 'target/release/bundle/nsis/*.exe', 'target/release/bundle/msi/*.msi' -ErrorAction Stop | ForEach-Object FullName)
          foreach ($file in $files) {
            & $signTool sign /fd SHA256 /sha $certificate.Thumbprint /tr $env:TIMESTAMP_URL /td SHA256 $file
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for $file." }
            & $signTool verify /pa /v $file
            if ($LASTEXITCODE -ne 0) { throw "Signature verification failed for $file." }
          }
      - name: Preserve installers in the workflow
        uses: actions/upload-artifact@v4
        with:
          name: Computability-Windows-${{ steps.release.outputs.tag || github.sha }}
          if-no-files-found: error
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
      - name: Publish installers to the version release
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem 'target/release/bundle/nsis/*.exe', 'target/release/bundle/msi/*.msi' -ErrorAction Stop |
            ForEach-Object { $_.FullName }
          )
          gh release view $env:TAG 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG $files --clobber
          } else {
            gh release create $env:TAG $files --generate-notes --title "Computability $env:TAG"
          }
