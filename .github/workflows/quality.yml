name: Quality

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          components: rustfmt, clippy
      - name: Install Tauri system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: Check Rust formatting
        run: cargo fmt --check
      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test simulation core
        run: cargo test --workspace
      - name: Install interface dependencies
        run: npm ci
      - name: Lint interface
        run: npm run lint
      - name: Build interface
        run: npm run build
      - name: Verify release metadata
        run: npm run release:check

  tag-master:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Create an immutable master-build tag
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          VERSION=$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)
          TAG="v${VERSION}-master.${RUN_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Master build $TAG" "$GITHUB_SHA"
          git push origin "$TAG"
      - name: Start Windows packaging for the verified tag
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          VERSION=$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)
          gh workflow run release-windows.yml --ref master -f tag="v${VERSION}-master.${RUN_NUMBER}"
